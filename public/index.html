<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>토르첼로 고양이와 채팅 | Chat with Cafe Torcello Cats</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <span class="cat-icon">🐱</span>
    <span class="brand-name">Cafe Torcello</span>
    <button class="clear-btn" id="clearBtn" title="대화 초기화">🗑️</button>
  </header>

  <!-- Cat Selector -->
  <div class="cat-selector" id="catSelector">
    <div class="selector-label">누구랑 놀까냥?</div>
    <div class="cat-list" id="catList"></div>
  </div>

  <main>
    <!-- Cat Profile -->
    <div class="cat-profile" id="catProfile">
      <div class="cat-avatar" id="catAvatar">😸</div>
      <div class="cat-name" id="catName">로딩 중...</div>
    </div>

    <!-- Chat Messages -->
    <div class="chat-messages" id="chatMessages"></div>

    <!-- Input Area -->
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="메시지를 입력하세요..." autocomplete="off" />
      <button id="sendButton">보내기</button>
    </div>

    <!-- Error Toast -->
    <div class="toast" id="toast"></div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
