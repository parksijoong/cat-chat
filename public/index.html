<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>토르첼로 고양이와 채팅 | Chat with Cafe Torcello Cats</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <span class="cat-icon">🐱</span>
    <span class="brand-name">Cafe Torcello</span>
  </header>

  <main>
    <!-- Cat Profile -->
    <div class="cat-profile">
      <div class="cat-avatar" id="catAvatar">😸</div>
      <div class="cat-name" id="catName">로딩 중...</div>
      <div class="cat-persona" id="catPersona"></div>
    </div>

    <!-- Chat Messages -->
    <div class="chat-messages" id="chatMessages">
      <div class="message cat">
        <div class="message-bubble">
          안녕! 나는 몽글이야. 오늘도 와줘서 기뻐! 😺
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="메시지를 입력하세요..." autocomplete="off" />
      <button id="sendButton">보내기</button>
    </div>

    <!-- Error Toast -->
    <div class="toast" id="toast"></div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
